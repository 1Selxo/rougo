name: Build and Release

on:
  push:
    tags:
      - 'V*'
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android:
    name: Build Android APKs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android native build tools
        run: yes | sdkmanager "ndk;27.0.12077973" "cmake;3.22.1"

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build release APKs
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Upload Android APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rougo-${{ github.ref_name }}-android-apks
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

  windows:
    name: Build Windows installers
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Install WiX Toolset
        shell: pwsh
        run: choco install wixtoolset --no-progress -y

      - name: Build Windows EXE and MSI
        shell: pwsh
        run: .\gradlew.bat -p windows packageDistributionForCurrentOS --stacktrace --no-daemon

      - name: Upload Windows installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rougo-${{ github.ref_name }}-windows-installers
          path: |
            windows/build/compose/binaries/main/exe/*.exe
            windows/build/compose/binaries/main/msi/*.msi
          if-no-files-found: error

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - android
      - windows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout changelog
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          make_latest: true
          body_path: CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
