name: Build and Release

on:
  push:
    tags:
      - 'V*'
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to update (leave blank for a build-only run)
        required: false
        type: string
      windows_only:
        description: Build and replace only the Windows installers
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  android:
    name: Build Android APKs
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.windows_only != true }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android native build tools
        run: yes | sdkmanager "ndk;27.0.12077973" "cmake;3.22.1"

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build release APKs
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Upload Android APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rougo-${{ github.ref_name }}-android-apks
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

  windows:
    name: Build Windows installers
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Install WiX Toolset
        shell: pwsh
        run: choco install wixtoolset --no-progress -y

      - name: Build Windows EXE and MSI
        shell: pwsh
        run: .\gradlew.bat -p windows packageDistributionForCurrentOS --stacktrace --no-daemon

      - name: Verify packaged JavaFX Swing runtime
        shell: pwsh
        run: |
          $runtimeModules = Get-ChildItem windows\build\compose\binaries\main -File -Filter modules -Recurse |
            Where-Object { $_.FullName -match '[\\/]runtime[\\/]lib[\\/]modules$' } |
            Select-Object -First 1
          if (-not $runtimeModules) {
            throw 'Packaged runtime module image was not found'
          }

          $runtimeContents = & "$env:JAVA_HOME\bin\jimage.exe" list $runtimeModules.FullName
          if ($LASTEXITCODE -ne 0 -or -not ($runtimeContents -match '^Module: jdk\.unsupported\.desktop$')) {
            throw 'Packaged runtime is missing jdk.unsupported.desktop'
          }
          if (-not ($runtimeContents -match 'jdk/swing/interop/SwingInterOpUtils\.class')) {
            throw 'Packaged runtime is missing jdk.swing.interop.SwingInterOpUtils'
          }

      - name: Upload Windows installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rougo-${{ github.ref_name }}-windows-installers
          path: |
            windows/build/compose/binaries/main/exe/*.exe
            windows/build/compose/binaries/main/msi/*.msi
          if-no-files-found: error

  release:
    name: Publish GitHub release
    if: >-
      always() &&
      needs.windows.result == 'success' &&
      (needs.android.result == 'success' || needs.android.result == 'skipped') &&
      (startsWith(github.ref, 'refs/tags/') || inputs.release_tag != '')
    needs:
      - android
      - windows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout changelog
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          name: ${{ inputs.release_tag || github.ref_name }}
          draft: false
          prerelease: false
          make_latest: true
          body_path: CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
